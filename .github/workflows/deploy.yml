# Stable releases only. Pushing a v* tag publishes to GitHub Pages; pushing to
# main no longer does anything here — that lands on the beta channel instead
# (see beta.yml), so main stays continuously testable without shipping to
# everyone. The release ritual is: bump package.json, commit, tag vX.Y.Z, push
# the tag.
name: Deploy to GitHub Pages

on:
  push:
    tags: [ 'v*' ]
  # Escape hatch for re-publishing the current tag without moving it.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# An installed PWA serves its shell cache-first, so a bad release stays on
# screen until the next launch. Everything below runs before the deploy, in
# order, and any failure means nothing is published.
jobs:
  build-and-deploy:
    environment:
      name: github-pages
    concurrency:
      group: "pages"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The version reaches users twice — the Setup badge and the service
      # worker's cache names — so a tag that disagrees with package.json ships a
      # build labelled with the wrong release. This also catches the easy
      # mistake of tagging without bumping, which would leave two different
      # builds claiming the same cache name.
      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($PKG)" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
